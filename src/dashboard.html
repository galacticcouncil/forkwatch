<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>forkwatch</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>♊</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; background: #0d1117; color: #c9d1d9; font-size: 13px; }
.header { padding: 16px 24px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
.header .uptime { color: #7d8590; font-size: 12px; }
.header .db { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.db.on { background: #1b4332; color: #3fb950; }
.db.off { background: #3d1f1f; color: #f85149; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; padding: 16px 24px; }
.card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: #484f58; }
.card.selected { border-color: #58a6ff; }
#filter-info { font-size: 11px; font-weight: 400; color: #7d8590; margin-left: 8px; cursor: pointer; }
#filter-info:hover { color: #58a6ff; }
.card h2 { font-size: 13px; font-weight: 600; color: #f0f6fc; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.card h2 .consensus { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #21262d; color: #7d8590; font-weight: 400; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat { background: #0d1117; border-radius: 6px; padding: 8px; }
.stat .label { font-size: 10px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.5px; }
.stat .value { font-size: 18px; font-weight: 600; color: #f0f6fc; margin-top: 2px; }
.stat .value.warn { color: #d29922; }
.stat .value.bad { color: #f85149; }
.stat .value.good { color: #3fb950; }
.nodes { margin-top: 8px; }
.node { display: inline-flex; align-items: center; gap: 4px; margin: 2px 4px 2px 0; font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #0d1117; }
.node .dot { width: 6px; height: 6px; border-radius: 50%; }
.node .dot.up { background: #3fb950; }
.node .dot.down { background: #f85149; }
.causes { margin-top: 8px; }
.cause-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 4px; margin-bottom: 8px; }
.cause-bar div { height: 100%; }
.cause-legend { display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px; }
.cause-legend span { display: flex; align-items: center; gap: 4px; }
.cause-legend .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
.color-relay { background: #f47067; }
.color-relay-same { background: #db6d28; }
.color-contention { background: #d29922; }
.color-double { background: #986ee2; }
.color-double-timing { background: #6e7681; }
.color-double-reorg { background: #316dca; }
.color-unknown { background: #21262d; }
.forks-table { width: 100%; margin-top: 8px; }
.forks-section { padding: 16px 24px; }
.forks-section h2 { font-size: 14px; font-weight: 600; color: #f0f6fc; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #21262d; color: #7d8590; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 5px 8px; border-bottom: 1px solid #161b22; }
tr:hover td { background: #161b22; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 500; }
.tag-relay { background: #3d1f1f; color: #f47067; }
.tag-relay-same { background: #3d2508; color: #db6d28; }
.tag-contention { background: #3d2e08; color: #d29922; }
.tag-double { background: #2a1f47; color: #986ee2; }
.tag-double-timing { background: #1c2028; color: #6e7681; }
.tag-double-reorg { background: #0e2a52; color: #316dca; }
.refresh { color: #7d8590; font-size: 11px; }
.slot-panel { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }
.slot-panel h3 { font-size: 12px; font-weight: 600; color: #f0f6fc; margin-bottom: 8px; }
.next-slot { padding: 8px 10px; background: #0d1117; border-radius: 6px; margin-bottom: 10px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
.countdown { color: #58a6ff; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="header">
  <h1>f<span style="filter:blur(2px)">or</span>kwatch</h1>
  <span class="db" id="db"></span>
  <span class="uptime" id="uptime"></span>
  <span class="refresh" id="refresh"></span>
</div>
<div class="grid" id="chains"></div>
<div class="forks-section" style="padding: 16px 24px">
  <div style="font-size: 11px; color: #7d8590; margin-bottom: 8px" id="filter-info"></div>
  <div id="slot-panel"></div>
  <table>
    <thead><tr><th>chain</th><th>height</th><th>authors</th><th>cause</th><th>depth</th><th>resolved</th><th>time</th></tr></thead>
    <tbody id="forks"></tbody>
  </table>
</div>

<script>
let selectedChain = null;
function toggleFilter(chain) {
  selectedChain = selectedChain === chain ? null : chain;
  update();
}

const CAUSE_COLORS = {
  relay_fork: 'relay',
  relay_fork_same_author: 'relay-same',
  collator_contention: 'contention',
  double_production: 'double',
  double_production_timing: 'double-timing',
  double_production_reorg: 'double-reorg',
  pending: 'unknown',
};

const CAUSE_LABELS = {
  relay_fork: 'relay',
  relay_fork_same_author: 'relay+dbl',
  collator_contention: 'contention',
  double_production: 'double',
  double_production_timing: 'dbl timing',
  double_production_reorg: 'dbl reorg',
  pending: 'pending',
};

const CAUSE_LABELS_LONG = {
  relay_fork: 'relay fork',
  relay_fork_same_author: 'relay fork (same author)',
  collator_contention: 'collator contention',
  double_production: 'double production',
  double_production_timing: 'double production (timing)',
  double_production_reorg: 'double production (reorg)',
};

function formatUptime(s) {
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  return `${Math.floor(s / 3600)}h ago`;
}

function lagClass(lag, chain) {
  if (chain === 'polkadot') return lag > 10 ? 'bad' : lag > 6 ? 'warn' : 'good';
  return lag > 20 ? 'bad' : lag > 10 ? 'warn' : 'good';
}

function renderChain(name, data, causes, uptimeS) {
  const lag = data.bestHeight - data.finalizedHeight;
  const connected = data.nodes.filter(n => n.connected).length;
  const total = data.nodes.length;
  const btMs = data.blockTimeMs;
  const btLabel = btMs ? `${(btMs / 1000).toFixed(btMs % 1000 ? 1 : 0)}s` : '?';

  // fork rate: forks in last hour / expected blocks in last hour
  let forkRateStr = '-';
  const forksLastHour = data.forksLastHour || 0;
  // use shorter window if uptime is less than 1 hour
  const windowMs = Math.min(uptimeS * 1000, 3600000);
  if (btMs && windowMs > 60000 && forksLastHour > 0) {
    const expectedBlocks = windowMs / btMs;
    const rate = (forksLastHour / expectedBlocks) * 100;
    forkRateStr = `${rate.toFixed(1)}%`;
  }
  const rateClass = parseFloat(forkRateStr) > 30 ? 'bad' : parseFloat(forkRateStr) > 15 ? 'warn' : '';

  const causeEntries = Object.entries(causes);
  const causeTotal = causeEntries.reduce((s, [, v]) => s + v, 0);

  let causeBar = '';
  let causeLegend = '';
  if (causeTotal > 0) {
    causeBar = '<div class="cause-bar">' + causeEntries.map(([cause, count]) => {
      const pct = (count / causeTotal * 100).toFixed(1);
      const color = CAUSE_COLORS[cause] || 'unknown';
      return `<div class="color-${color}" style="width:${pct}%" title="${CAUSE_LABELS[cause] || cause}: ${count}"></div>`;
    }).join('') + '</div>';
    causeLegend = '<div class="cause-legend">' + causeEntries.map(([cause, count]) => {
      const color = CAUSE_COLORS[cause] || 'unknown';
      return `<span><span class="dot color-${color}"></span>${CAUSE_LABELS[cause] || cause} ${count}</span>`;
    }).join('') + '</div>';
  }

  const selected = selectedChain === name ? ' selected' : '';
  return `<div class="card${selected}" onclick="toggleFilter('${name}')">
    <h2>${name} <span class="consensus">${data.consensus}</span> <span class="consensus">${btLabel}</span></h2>
    <div class="stats">
      <div class="stat"><div class="label">best</div><div class="value">${data.bestHeight.toLocaleString()}</div></div>
      <div class="stat"><div class="label">finality lag</div><div class="value ${lagClass(lag, name)}">${lag}</div></div>
      <div class="stat"><div class="label">fork rate</div><div class="value ${rateClass}">${forkRateStr}</div></div>
    </div>
    ${renderMissRate(data)}
    <div class="nodes">${data.nodes.map(n =>
      `<span class="node"><span class="dot ${n.connected ? 'up' : 'down'}"></span>${n.name}</span>`
    ).join('')}</div>
    ${causeBar ? `<div class="causes">${causeBar}${causeLegend}</div>` : ''}
  </div>`;
}

function renderMissRate(data) {
  const missed = data.missedSlots || 0;
  const produced = data.producedSlots || 0;
  const total = missed + produced;
  if (total === 0) return '';
  const rate = (missed / total * 100).toFixed(1);
  const color = rate > 10 ? '#f85149' : rate > 5 ? '#d29922' : '#3fb950';
  return `<div style="margin-top:8px;font-size:11px;color:#7d8590">
    missed slots: <span style="color:${color}">${rate}%</span>
    <span style="color:#6e7681">(${missed}/${total})</span>
  </div>`;
}

function renderSlotPanel(chainName, data) {
  if (!data || data.consensus !== 'aura') return '';
  if (!data.slotHistory?.length && !data.nextExpectedAuthor) return '';

  const history = data.slotHistory.slice().reverse();
  const rows = history.slice(0, 10).map(h => {
    const status = h.produced
      ? `<span style="color:#3fb950">✓ produced</span>`
      : `<span style="color:#f85149">✗ missed</span>`;
    const name = h.expected ? authorSpan(h.expected) : '<span style="color:#6e7681">?</span>';
    const block = h.block
      ? `<span style="color:#58a6ff">#${h.block.toLocaleString()}</span>`
      : `<span style="color:#6e7681">—</span>`;
    return `<tr>
      <td style="color:#6e7681;font-size:10px;padding:3px 8px">${h.slot}</td>
      <td style="padding:3px 8px">${block}</td>
      <td style="padding:3px 8px">${name}</td>
      <td style="text-align:right;padding:3px 8px">${status}</td>
    </tr>`;
  }).join('');

  // countdown data attributes -- updated by a tick interval
  const next = data.nextExpectedAuthor
    ? `<div class="next-slot">
        <span>next expected: ${authorSpan(data.nextExpectedAuthor)}</span>
        <span class="countdown" data-last-ts="${data.lastSlotImportedAt || 0}" data-block-time="${data.blockTimeMs || 0}">—</span>
      </div>`
    : '';

  return `<div class="slot-panel">
    <h3>slot schedule · ${chainName}</h3>
    ${next}
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="color:#7d8590;font-size:10px;border-bottom:1px solid #21262d">
        <th style="text-align:left;padding:4px 8px">slot</th>
        <th style="text-align:left;padding:4px 8px">block</th>
        <th style="text-align:left;padding:4px 8px">expected</th>
        <th style="text-align:right;padding:4px 8px">status</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function tickCountdowns() {
  for (const el of document.querySelectorAll('.countdown')) {
    const lastTs = Number(el.dataset.lastTs);
    const bt = Number(el.dataset.blockTime);
    if (!lastTs || !bt) { el.textContent = '—'; continue; }
    const next = lastTs + bt;
    const remaining = next - Date.now();
    if (remaining > 0) {
      el.textContent = `${(remaining / 1000).toFixed(1)}s`;
      el.style.color = '#58a6ff';
    } else {
      el.textContent = `+${Math.abs(remaining / 1000).toFixed(1)}s late`;
      el.style.color = '#d29922';
    }
  }
}
setInterval(tickCountdowns, 100);

const AUTHOR_HUES = [
  210, 150, 30, 330, 270, 60, 180, 120, 300, 0, 240, 90, 345, 195, 45,
];
const authorColorMap = new Map();
let nextHue = 0;

function authorColor(name) {
  if (!name || name === 'unknown') return '#6e7681';
  if (!authorColorMap.has(name)) {
    authorColorMap.set(name, `hsl(${AUTHOR_HUES[nextHue++ % AUTHOR_HUES.length]}, 60%, 65%)`);
  }
  return authorColorMap.get(name);
}

function shortName(name) {
  if (!name || name === 'unknown') return '?';
  if (/^[1-9A-HJ-NP-Za-km-z]{46,}$/.test(name)) return name.slice(0, 6) + '..' + name.slice(-4);
  if (name.startsWith('0x') && name.length > 16) return name.slice(0, 8) + '..' + name.slice(-4);
  if (name.length > 20) return name.slice(0, 18) + '..';
  return name;
}

function authorSpan(name) {
  const color = authorColor(name);
  const short = shortName(name);
  return `<span style="color:${color}" title="${name}">${short}</span>`;
}

function renderFork(f) {
  const cause = f.cause || '';
  const color = CAUSE_COLORS[cause] || '';
  const tagClass = color ? `tag-${color}` : '';
  const label = CAUSE_LABELS[cause] || cause || '-';
  const longLabel = CAUSE_LABELS_LONG[cause] || cause || '';
  const authorsHtml = f.same_author
    ? authorSpan(f.authors?.[0]) + ' <span style="color:#6e7681">(x2)</span>'
    : (f.authors || []).map(authorSpan).join(' <span style="color:#6e7681">vs</span> ');

  return `<tr>
    <td>${f.chain}</td>
    <td>${Number(f.block_number).toLocaleString()}</td>
    <td>${authorsHtml}</td>
    <td>${cause ? `<span class="tag ${tagClass}" title="${longLabel}">${label}</span>` : '-'}</td>
    <td>${f.depth}</td>
    <td style="text-align:center">${f.resolved ? '&#x2705;' : '&#x23F3;'}</td>
    <td>${timeAgo(f.detected_at)}</td>
  </tr>`;
}

async function update() {
  try {
    const [status, forks] = await Promise.all([
      fetch('/api/status').then(r => r.json()),
      fetch(selectedChain ? `/api/forks/${selectedChain}?limit=100` : '/api/forks?limit=100').then(r => r.json()),
    ]);

    document.getElementById('db').textContent = status.database ? 'db connected' : 'no db';
    document.getElementById('db').className = `db ${status.database ? 'on' : 'off'}`;
    document.getElementById('uptime').textContent = `uptime ${formatUptime(status.uptime)}`;
    document.getElementById('refresh').textContent = `updated ${new Date().toLocaleTimeString()}`;

    const causesByChain = {};
    forks.forEach(f => {
      if (!causesByChain[f.chain]) causesByChain[f.chain] = {};
      const cause = f.cause || 'pending';
      causesByChain[f.chain][cause] = (causesByChain[f.chain][cause] || 0) + 1;
    });

    const chainNames = Object.keys(status).filter(k => !['database', 'uptime'].includes(k));
    document.getElementById('chains').innerHTML = chainNames.map(name =>
      renderChain(name, status[name], causesByChain[name] || {}, status.uptime)
    ).join('');

    const filtered = selectedChain ? forks.filter(f => f.chain === selectedChain) : forks;
    document.getElementById('forks').innerHTML = filtered.map(renderFork).join('');
    document.getElementById('filter-info').innerHTML = selectedChain
      ? `${selectedChain} only · <span onclick="toggleFilter('${selectedChain}')" style="text-decoration:underline;cursor:pointer">clear</span>`
      : '';

    // slot schedule only when a specific chain is filtered
    document.getElementById('slot-panel').innerHTML = selectedChain
      ? renderSlotPanel(selectedChain, status[selectedChain])
      : '';
  } catch (e) {
    document.getElementById('refresh').textContent = `error: ${e.message}`;
  }
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
